<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verificar código — Koregh Store</title>
      <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .code-input { text-align:center;font-size:30px;letter-spacing:14px;font-family:monospace;padding:14px; }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <a href="/" class="brand">Koregh Store</a>
        <h1>Verificação em duas etapas</h1>
        <p style="font-size:13px; color:var(--text-muted); text-align:center;">
            Enviamos um código de 6 dígitos para <strong th:text="${email}"></strong>.
        </p>

        <ul class="flash-list" th:if="${erro}"><li class="error" th:text="${erro}"></li></ul>
        <ul class="flash-list" th:if="${info}"><li class="info" th:text="${info}"></li></ul>

        <form method="POST" th:action="@{/esqueci-senha/verificar}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="field">
                <label for="codigo">Código de 6 dígitos</label>
                <input id="codigo" class="code-input" type="text" name="codigo"
                       required minlength="6" maxlength="6" pattern="\d{6}" autofocus>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:11px;">Verificar</button>
        </form>

        <p class="footer-link"><a href="/esqueci-senha">← Solicitar novo código</a></p>
    </div>
</div>
<div th:replace="fragments/theme :: themeScript"></div>
</body>
</html>
