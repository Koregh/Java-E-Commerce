<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirmar alteração — Koregh Store</title>
      <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .code-input { text-align:center;font-size:30px;font-weight:700;letter-spacing:14px;font-family:monospace;padding:14px; }
        .email-hint { font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:22px;line-height:1.6; }
        .resend-btn { width:100%;background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border);padding:10px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;transition:background var(--transition);font-family:var(--font-body);margin-top:10px; }
        .resend-btn:hover { background:var(--bg);color:var(--text); }
        .ctx-badge { display:inline-block;background:var(--warn-bg);color:var(--warn);border:1px solid #fde68a;border-radius:20px;font-size:12px;font-weight:600;padding:3px 12px;margin-bottom:14px; }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <a href="/" class="brand">Koregh Store</a>
        <div style="text-align:center;font-size:38px;margin-bottom:8px;">🔒</div>
        <h1>Confirmar alteração</h1>

        <div style="text-align:center;margin-bottom:16px;">
            <span class="ctx-badge"
                  th:text="${contexto == 'email'} ? 'Troca de e-mail' : 'Troca de senha'">Troca</span>
        </div>

        <p class="email-hint">
            Código enviado para <strong th:text="${email}">email</strong>.<br>
            <span style="color:var(--warn);font-weight:500;">Válido por 15 minutos.</span>
        </p>

        <ul class="flash-list" th:if="${erro}">
            <li class="error" th:text="${erro}"></li>
        </ul>
        <ul class="flash-list" th:if="${info}">
            <li class="info" th:text="${info}"></li>
        </ul>

        <form method="POST" th:action="@{/minha-conta/verificar}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="field">
                <label for="codigo">Código de verificação</label>
                <input id="codigo" class="code-input" type="text" name="codigo"
                       placeholder="000000" required minlength="6" maxlength="6"
                       pattern="\d{6}" inputmode="numeric" autocomplete="one-time-code" autofocus>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;">Confirmar</button>
        </form>

        <form method="POST" th:action="@{/minha-conta/verificar/reenviar}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="resend-btn">↻ Reenviar código</button>
        </form>

        <p class="footer-link" style="margin-top:16px;"><a href="/minha-conta">← Cancelar e voltar</a></p>
    </div>
</div>
<script>
    document.getElementById('codigo').addEventListener('input', function() {
        if (this.value.length === 6 && /^\d{6}$/.test(this.value)) this.closest('form').submit();
    });
</script>
<div th:replace="fragments/theme :: themeScript"></div>
</body>
</html>
