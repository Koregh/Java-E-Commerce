<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logs de auditoria — Koregh Store</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .admin-page { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }

        .admin-head { margin-bottom: 24px; }
        .admin-head h1 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 4px; letter-spacing: -0.2px; }
        .admin-head p  { font-size: 13px; color: var(--text-muted); font-weight: 300; }

        /* ── Filtros ── */
        .filtros {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filtros-label { font-size: 13px; color: var(--text-muted); }
        .tipo-select {
            font-family: var(--font-body);
            font-size: 13px;
            padding: 8px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface-2);
            color: var(--text);
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            min-width: 180px;
        }
        .tipo-select:focus { border-color: var(--border-focus); outline: none; }

        /* ── Log row ── */
        .log-acao {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 500;
            background: var(--accent-subtle);
            color: var(--accent);
        }
        .log-desc {
            font-size: 13px;
            color: var(--text);
            max-width: 320px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .log-ip {
            font-size: 12px;
            color: var(--text-muted);
            font-family: monospace;
        }
        .log-user {
            font-size: 13px;
            color: var(--text);
        }
        .log-date {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .table-footer {
            padding: 12px 16px;
            font-size: 12px;
            color: var(--text-light);
            border-top: 1px solid var(--border);
        }

        .pagination-wrap { margin-top: 20px; display: flex; justify-content: center; gap: 8px; }

        @media (max-width: 800px) { .hide-sm { display: none; } .admin-page { padding: 16px 12px 48px; } }
    </style>
</head>
<body>

<header class="navbar">
    <a href="/" class="logo">Koregh Store</a>
    <div class="nav-actions">
        <a href="/dashboard" class="btn btn-ghost">&#8592; Dashboard</a>
        <a href="/painel/pedidos" class="btn btn-ghost">Pedidos</a>
        <a href="/painel/usuarios" class="btn btn-ghost">Usuários</a>
        <form method="post" th:action="@{/logout}" sec:authorize="isAuthenticated()" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-danger">Sair</button>
        </form>
        <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">🌙</button>
    </div>
</header>

<div class="admin-page">

    <div class="admin-head">
        <h1>Logs de auditoria</h1>
        <p>Registro de ações realizadas no sistema.</p>
    </div>

    <!-- Filtro de tipo -->
    <form method="GET" th:action="@{/painel}" class="filtros">
        <span class="filtros-label">Filtrar por ação</span>
        <select name="tipo" class="tipo-select">
            <option value="">Todas as ações</option>
            <option th:each="t : ${T(com.koreghstore.ecommerce.model.AuditLog.TipoAcao).values()}"
                    th:value="${t}"
                    th:text="${t}"
                    th:selected="${t.name() == tipoSelecionado}">TIPO</option>
        </select>
        <button type="submit" class="btn btn-primary" style="padding:8px 16px;font-size:13px;">Filtrar</button>
    </form>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Usuário</th>
                    <th>Ação</th>
                    <th>Descrição</th>
                    <th class="hide-sm">IP</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="log : ${logs}">
                    <td>
                        <span class="log-date"
                              th:text="${#temporals.format(log.criadoEm,'dd/MM/yyyy HH:mm')}">data</span>
                    </td>
                    <td>
                        <span class="log-user" th:text="${log.usuarioEmail}">email</span>
                    </td>
                    <td>
                        <span class="log-acao" th:text="${log.tipo}">AÇÃO</span>
                    </td>
                    <td>
                        <span class="log-desc" th:text="${log.descricao}">Descrição</span>
                    </td>
                    <td class="hide-sm">
                        <span class="log-ip" th:text="${log.ip}">0.0.0.0</span>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="table-footer" th:text="${logs.size()} + ' registro(s) exibido(s)'">0 registros</div>
    </div>

    <div th:if="${totalPaginas > 1}" class="pagination-wrap">
        <a th:if="${paginaAtual > 0}"
           th:href="@{/painel(page=${paginaAtual - 1}, size=25, tipo=${tipoSelecionado})}"
           class="page-btn">&#8249; Anterior</a>
        <span th:unless="${paginaAtual > 0}" class="page-btn disabled">&#8249; Anterior</span>

        <th:block th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}">
            <a th:if="${i != paginaAtual}"
               th:href="@{/painel(page=${i}, size=25, tipo=${tipoSelecionado})}"
               class="page-btn" th:text="${i + 1}"></a>
            <span th:if="${i == paginaAtual}" class="page-btn active" th:text="${i + 1}"></span>
        </th:block>

        <a th:if="${paginaAtual + 1 < totalPaginas}"
           th:href="@{/painel(page=${paginaAtual + 1}, size=25, tipo=${tipoSelecionado})}"
           class="page-btn">Próximo &#8250;</a>
        <span th:unless="${paginaAtual + 1 < totalPaginas}" class="page-btn disabled">Próximo &#8250;</span>
    </div>

</div>

<div th:replace="fragments/theme :: themeScript"></div>
</body>
</html>
