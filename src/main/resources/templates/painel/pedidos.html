<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pedidos — FUZZI FILMS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .admin-page { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }

        .admin-head { margin-bottom: 24px; }
        .admin-head h1 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 4px; letter-spacing: -0.2px; }

        /* ── Filtros ── */
        .filtros {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filtros-label { font-size: 13px; color: var(--text-muted); font-weight: 400; }
        .status-select {
            font-family: var(--font-body);
            font-size: 13px;
            padding: 8px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface-2);
            color: var(--text);
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            min-width: 160px;
        }
        .status-select:focus { border-color: var(--border-focus); outline: none; }

        /* ── Table tweaks ── */
        .client-cell { display: flex; flex-direction: column; gap: 2px; }
        .client-name  { font-size: 13.5px; font-weight: 500; color: var(--text); }
        .client-email { font-size: 12px; color: var(--text-muted); font-weight: 300; }

        .product-cell { font-size: 13px; color: var(--text); }
        .product-more { font-size: 12px; color: var(--text-muted); font-weight: 300; }

        /* ── Footer ── */
        .table-footer {
            padding: 12px 16px;
            font-size: 12px;
            color: var(--text-light);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .pagination-wrap { margin-top: 20px; display: flex; justify-content: center; gap: 8px; }

        @media (max-width: 800px) { .hide-sm { display: none; } .admin-page { padding: 16px 12px 48px; } }
    </style>
</head>
<body>

<header class="navbar">
    <a href="/" class="logo">FUZZI FILMS</a>
    <div class="nav-actions">
        <a href="/painel" class="btn btn-ghost">&#8592; Painel</a>
        <a href="/painel/usuarios" class="btn btn-ghost">Usuários</a>
        <a href="/dashboard" class="btn btn-ghost">Dashboard</a>
        <form method="post" th:action="@{/logout}" sec:authorize="isAuthenticated()" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-danger">Sair</button>
        </form>
        <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">🌙</button>
    </div>
</header>

<div class="admin-page">

    <div class="admin-head">
        <h1>Gerenciar Pedidos</h1>
    </div>

    <ul class="flash-list" th:if="${sucesso}" style="margin-bottom:16px;"><li class="success" th:text="${sucesso}"></li></ul>
    <ul class="flash-list" th:if="${erro}"    style="margin-bottom:16px;"><li class="error"   th:text="${erro}"></li></ul>

    <!-- Filtro de status -->
    <form method="GET" th:action="@{/painel/pedidos}" class="filtros">
        <span class="filtros-label">Filtrar por status</span>
        <select name="status" class="status-select">
            <option value="">Todos os pedidos</option>
            <option th:each="s : ${T(com.fuzzyfilms.ecommerce.model.Pedido.StatusPedido).values()}"
                    th:value="${s}"
                    th:text="${s}"
                    th:selected="${param.status != null && param.status[0] == s.name()}">Status</option>
        </select>
        <button type="submit" class="btn btn-primary" style="padding:8px 16px;font-size:13px;">Filtrar</button>
    </form>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Cliente</th>
                    <th>Produto(s)</th>
                    <th class="hide-sm">Total</th>
                    <th>Status</th>
                    <th class="hide-sm">Data</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${pedidos}">
                    <td style="color:var(--text-muted);font-size:13px;" th:text="${p.id}">0</td>
                    <td>
                        <div class="client-cell">
                            <span class="client-name"  th:text="${p.comprador.nome}">Nome</span>
                            <span class="client-email" th:text="${p.comprador.email}">email</span>
                        </div>
                    </td>
                    <td>
                        <span class="product-cell"
                              th:each="item, iterStat : ${p.itens}"
                              th:if="${iterStat.index == 0}"
                              th:text="${item.produto.nome}">Produto</span>
                        <span class="product-more"
                              th:if="${p.itens.size() > 1}"
                              th:text="'+ ' + ${p.itens.size() - 1} + ' outro(s)'"></span>
                    </td>
                    <td class="hide-sm"
                        th:text="'R$ ' + ${#numbers.formatDecimal(p.valorTotal,1,'COMMA',2,'POINT')}">R$ 0</td>
                    <td>
                        <span class="status-pill" th:classappend="'status-' + ${p.status}"
                              th:text="${statusLabels.get(p.status.name())}">Status</span>
                    </td>
                    <td class="hide-sm" style="font-size:12px;color:var(--text-muted);"
                        th:text="${#temporals.format(p.criadoEm,'dd/MM/yyyy HH:mm')}">Data</td>
                    <td>
                        <a th:href="@{/pedidos/{id}(id=${p.id})}"
                           class="btn btn-ghost" style="padding:6px 12px;font-size:12px;">
                            Ver
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="table-footer">
            <span th:text="'Mostrando ' + ${pedidos.size()} + ' de ' + ${totalElementos} + ' pedidos'">0 pedidos</span>
        </div>
    </div>

    <div th:if="${totalPaginas > 1}" class="pagination-wrap">
        <a th:if="${paginaAtual > 0}"
           th:href="@{/painel/pedidos(page=${paginaAtual - 1}, size=${size}, status=${param.status != null ? param.status[0] : ''})}"
           class="page-btn">&#8249; Anterior</a>
        <span th:unless="${paginaAtual > 0}" class="page-btn disabled">&#8249; Anterior</span>

        <th:block th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}">
            <a th:if="${i != paginaAtual}"
               th:href="@{/painel/pedidos(page=${i}, size=${size}, status=${param.status != null ? param.status[0] : ''})}"
               class="page-btn" th:text="${i + 1}"></a>
            <span th:if="${i == paginaAtual}" class="page-btn active" th:text="${i + 1}"></span>
        </th:block>

        <a th:if="${paginaAtual + 1 < totalPaginas}"
           th:href="@{/painel/pedidos(page=${paginaAtual + 1}, size=${size}, status=${param.status != null ? param.status[0] : ''})}"
           class="page-btn">Próximo &#8250;</a>
        <span th:unless="${paginaAtual + 1 < totalPaginas}" class="page-btn disabled">Próximo &#8250;</span>
    </div>

</div>

<div th:replace="fragments/theme :: themeScript"></div>
</body>
</html>
