<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
      <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
    <title th:text="${produto.nome} + ' — FUZZI FILMS'">Produto</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .produto-page {
            max-width: 1080px;
            margin: 36px auto;
            padding: 0 24px 80px;
        }

        /* ── Breadcrumb ── */
        .produto-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
            font-weight: 300;
        }
        .produto-breadcrumb a { color: var(--text-muted); text-decoration: none; transition: color var(--transition); }
        .produto-breadcrumb a:hover { color: var(--text); }
        .produto-breadcrumb .sep { color: var(--text-light); }

        /* ── Layout ── */
        .produto-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
            align-items: start;
        }

        /* ── Imagem ── */
        .produto-img-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }
        .produto-img {
            width: 100%;
            height: 400px;
            object-fit: contain;
            background: var(--surface-2);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: block;
        }
        .produto-img-placeholder {
            width: 100%;
            height: 400px;
            background: var(--surface-2);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
        }

        /* ── Info abaixo da imagem ── */
        .produto-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .produto-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 6px;
            letter-spacing: -0.2px;
        }
        .produto-vendor {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 16px;
        }
        .produto-vendor strong { font-weight: 500; color: var(--text); }
        .produto-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.75;
            font-weight: 300;
        }
        .produto-sales {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 14px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-light);
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
        }

        /* ── Compra box (sidebar) ── */
        .compra-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 76px;
        }

        .preco {
            font-size: 34px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.8px;
            margin-bottom: 4px;
            line-height: 1;
        }
        .preco sup {
            font-size: 16px;
            font-weight: 500;
            vertical-align: super;
            margin-right: 2px;
        }

        .estoque-info {
            font-size: 12.5px;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 20px;
            margin-top: 6px;
        }
        .estoque-esgotado {
            font-size: 13px;
            color: var(--danger);
            font-weight: 500;
            margin-bottom: 20px;
            margin-top: 6px;
        }

        /* ── Quantidade ── */
        .qtd-section {
            margin-bottom: 18px;
        }
        .qtd-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        .qtd-control {
            display: flex;
            align-items: center;
            gap: 0;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            width: fit-content;
        }
        .qtd-btn {
            width: 38px;
            height: 38px;
            border: none;
            background: var(--surface-2);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: background var(--transition), color var(--transition);
            flex-shrink: 0;
        }
        .qtd-btn:hover { background: var(--bg); color: var(--text); }
        .qtd-input {
            width: 52px;
            text-align: center;
            border: none;
            border-left: 1.5px solid var(--border);
            border-right: 1.5px solid var(--border);
            padding: 8px 4px;
            font-size: 15px;
            font-weight: 600;
            font-family: var(--font-body);
            background: var(--surface);
            color: var(--text);
            outline: none;
        }

        /* ── Opções extras ── */
        .opcao-box {
            margin-bottom: 12px;
            padding: 13px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }
        .opcao-box-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .opcao-box-title span { font-size: 12px; color: var(--text-muted); font-weight: 300; }

        .opcao-check {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            cursor: pointer;
        }
        .opcao-check input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .field.compra-field { margin-bottom: 0; }
        .field.compra-field input[type="date"],
        .field.compra-field select {
            font-size: 13.5px;
        }
        .field-note {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 5px;
            font-weight: 300;
        }

        /* ── Botões de ação ── */
        .compra-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 18px;
        }
        .btn-comprar-agora {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: var(--success);
            color: #fff;
            font-family: var(--font-body);
            transition: background var(--transition);
        }
        .btn-comprar-agora:hover { background: #15803d; }
        .btn-comprar-agora:disabled { opacity: 0.45; cursor: not-allowed; }

        .compra-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        @media (max-width: 900px) {
            .produto-layout { grid-template-columns: 1fr; }
            .compra-box { position: static; }
            .produto-img, .produto-img-placeholder { height: 280px; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <a href="/" class="logo">FUZZI FILMS</a>
    <div class="nav-actions">
        <a href="/" class="btn btn-ghost">&#8592; Loja</a>
        <a href="/carrinho" class="btn btn-ghost">Carrinho</a>
        <a href="/pedidos" class="btn btn-ghost">Meus Pedidos</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">🌙</button>
    </div>
</header>

<div class="produto-page">

    <nav class="produto-breadcrumb">
        <a href="/">Loja</a>
        <span class="sep">/</span>
        <span th:text="${produto.nome}">Produto</span>
    </nav>

    <ul class="flash-list" th:if="${sucesso}" style="margin-bottom:16px;">
        <li class="success" th:text="${sucesso}"></li>
    </ul>
    <ul class="flash-list" th:if="${erro}" style="margin-bottom:16px;">
        <li class="error" th:text="${erro}"></li>
    </ul>

    <div class="produto-layout">

        <!-- ══ Imagem + Info ══ -->
        <div class="produto-img-card">
            <img class="produto-img"
                 th:if="${produto.imagem != null}"
                 th:src="@{/uploads/images/__${produto.imagem}__}"
                 th:alt="${produto.nome}">
            <div class="produto-img-placeholder" th:unless="${produto.imagem != null}">📦</div>

            <div class="produto-info">
                <h1 class="produto-title" th:text="${produto.nome}">Nome do produto</h1>
                <p class="produto-vendor">
                    Vendido por <strong th:text="${produto.vendedor.nome}">Vendedor</strong>
                </p>
                <p class="produto-desc" th:text="${produto.descricao ?: 'Sem descrição disponível.'}">Descrição</p>
                <span class="produto-sales"
                      th:if="${produto.vendasRealizadas > 0}"
                      th:text="${produto.vendasRealizadas} + ' venda(s) realizada(s)'"></span>
            </div>
        </div>

        <!-- ══ Compra box ══ -->
        <div class="compra-box">

            <div class="preco">
                <sup>R$</sup><span th:text="${#numbers.formatDecimal(produto.preco,1,'COMMA',2,'POINT')}">0,00</span>
            </div>

            <p class="estoque-info"
               th:if="${produto.estoque > 0}"
               th:text="${produto.estoque} + ' unidade(s) disponível(is)'"></p>
            <p class="estoque-esgotado" th:unless="${produto.estoque > 0}">Produto esgotado</p>

            <div th:if="${produto.estoque > 0}">

                <!-- Quantidade -->
                <div class="qtd-section">
                    <p class="qtd-label">Quantidade</p>
                    <div class="qtd-control">
                        <button class="qtd-btn" type="button" onclick="menos()">&#8722;</button>
                        <input class="qtd-input" id="quantidade" type="number" value="1" min="1"
                               th:max="${produto.estoque}">
                        <button class="qtd-btn" type="button" onclick="mais()">&#43;</button>
                    </div>
                </div>

                <!-- Entrega urgente -->
                <div class="opcao-box" th:if="${produto.aceitaEntregaUrgente}">
                    <label class="opcao-check">
                        <input type="checkbox" name="entregaUrgente" value="true" id="chk-urgente"
                               form="form-compra">
                        <div>
                            <p class="opcao-box-title">
                                Entrega urgente <span>(taxa adicional)</span>
                            </p>
                        </div>
                    </label>
                </div>

                <!-- Agendamento -->
                <div class="opcao-box" th:if="${produto.aceitaAgendamento}">
                    <p class="opcao-box-title">Agendar entrega</p>
                    <div class="field compra-field">
                        <label for="data-agendamento">Data</label>
                        <input type="date" id="data-agendamento" name="dataAgendamento" form="form-compra">
                    </div>
                    <div class="field compra-field"
                         th:if="${produto.horariosEntrega != null and !#strings.isEmpty(produto.horariosEntrega)}"
                         style="margin-top:8px;">
                        <label for="horario-agendamento">Horário preferido</label>
                        <select id="horario-agendamento" name="horarioAgendamento" form="form-compra">
                            <option value="">Qualquer horário</option>
                            <option th:each="h : ${#strings.arraySplit(produto.horariosEntrega, ',')}"
                                    th:value="${h}" th:text="${h}">Horário</option>
                        </select>
                    </div>
                    <p class="field-note">Disponibilidade sujeita à capacidade de entrega.</p>
                </div>

                <!-- Ações -->
                <div class="compra-actions">
                    <form th:action="@{/pedidos/comprar/{id}(id=${produto.id})}" method="POST" id="form-compra">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="quantidade" id="qtd-compra" value="1">
                        <button class="btn-comprar-agora" type="submit">Comprar agora</button>
                    </form>

                    <div class="compra-divider"></div>

                    <form th:action="@{/carrinho/adicionar/{id}(id=${produto.id})}" method="POST">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="quantidade" id="qtd-carrinho" value="1">
                        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:14px;">
                            Adicionar ao carrinho
                        </button>
                    </form>
                </div>

            </div>

            <!-- Esgotado -->
            <div th:unless="${produto.estoque > 0}">
                <button class="btn-comprar-agora" disabled>Indisponível</button>
            </div>

        </div>
    </div>
</div>

<script>
    const maxEstoque = /*[[${produto.estoque}]]*/ 99;

    function sync() {
        const v = parseInt(document.getElementById('quantidade').value) || 1;
        const clamped = Math.max(1, Math.min(v, maxEstoque));
        document.getElementById('quantidade').value = clamped;
        document.getElementById('qtd-compra').value = clamped;
        const carrinho = document.getElementById('qtd-carrinho');
        if (carrinho) carrinho.value = clamped;
    }

    function mais() {
        const el = document.getElementById('quantidade');
        if (parseInt(el.value) < maxEstoque) { el.value = parseInt(el.value) + 1; sync(); }
    }
    function menos() {
        const el = document.getElementById('quantidade');
        if (parseInt(el.value) > 1) { el.value = parseInt(el.value) - 1; sync(); }
    }

    document.getElementById('quantidade')?.addEventListener('input', sync);
</script>

<div th:replace="fragments/theme :: themeScript"></div>
</body>
</html>
