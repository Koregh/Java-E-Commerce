<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Finalizar Compra — FUZZI FILMS</title>
      <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .checkout-page {
            max-width: 860px;
            margin: 36px auto;
            padding: 0 24px 80px;
        }

        /* ── Breadcrumb ── */
        .checkout-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
            font-weight: 300;
        }
        .checkout-breadcrumb a { color: var(--text-muted); text-decoration: none; transition: color var(--transition); }
        .checkout-breadcrumb a:hover { color: var(--text); }
        .checkout-breadcrumb .sep { color: var(--text-light); }

        /* ── Layout ── */
        .checkout-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            align-items: start;
        }

        /* ── Cards ── */
        .checkout-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px 26px;
            box-shadow: var(--shadow-sm);
        }
        .checkout-card + .checkout-card { margin-top: 16px; }

        .checkout-card-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: var(--text-light);
            margin-bottom: 18px;
        }

        /* ── Itens ── */
        .item-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .item-row:first-of-type { padding-top: 0; }
        .item-row:last-of-type { border-bottom: none; padding-bottom: 0; }

        .item-img {
            width: 46px;
            height: 46px;
            object-fit: contain;
            border-radius: var(--radius-sm);
            background: var(--surface-2);
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        .item-ph {
            width: 46px;
            height: 46px;
            border-radius: var(--radius-sm);
            background: var(--surface-2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .item-info { flex: 1; min-width: 0; }
        .item-name {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .item-qty {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 300;
        }
        .item-price {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── Método de pagamento ── */
        .metodo-opcoes { display: flex; flex-direction: column; gap: 10px; }

        .metodo-label {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition);
            user-select: none;
        }
        .metodo-label:hover { border-color: var(--border-mid); background: var(--surface-2); }
        .metodo-label input[type="radio"] { display: none; }
        .metodo-label.selected {
            border-color: var(--accent);
            background: var(--accent-subtle);
        }

        .metodo-radio-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--border-mid);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: border-color var(--transition);
        }
        .metodo-label.selected .metodo-radio-dot {
            border-color: var(--accent);
        }
        .metodo-radio-dot::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0;
            transition: opacity var(--transition);
        }
        .metodo-label.selected .metodo-radio-dot::after { opacity: 1; }

        .metodo-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: var(--surface-2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .metodo-texto { flex: 1; }
        .metodo-nome {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 2px;
        }
        .metodo-desc {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 300;
        }
        .metodo-badge {
            font-size: 11px;
            font-weight: 500;
            padding: 3px 9px;
            border-radius: 20px;
            flex-shrink: 0;
        }
        .metodo-badge-pix {
            background: var(--success-bg);
            color: var(--success);
        }
        .metodo-badge-mp {
            background: var(--info-bg);
            color: var(--info);
        }

        /* ── Resumo (sidebar) ── */
        .resumo-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 22px;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 76px;
        }

        .resumo-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: var(--text-light);
            margin-bottom: 16px;
        }

        .resumo-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 13.5px;
            margin-bottom: 10px;
            gap: 10px;
        }
        .resumo-row .lbl { color: var(--text-muted); font-weight: 300; }
        .resumo-row .val { font-weight: 500; color: var(--text); }
        .resumo-row .val-ok { color: var(--success); font-weight: 500; }

        .resumo-divider { height: 1px; background: var(--border); margin: 14px 0; }

        .resumo-total {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
            margin-bottom: 20px;
        }
        .resumo-total .lbl-total { font-size: 14px; font-weight: 500; color: var(--text-muted); }

        .btn-pagar {
            width: 100%;
            padding: 13px;
            font-size: 15px;
        }

        .resumo-seguro {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-light);
            font-weight: 300;
            margin-top: 14px;
        }

        @media (max-width: 700px) {
            .checkout-layout { grid-template-columns: 1fr; }
            .resumo-card { position: static; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <a href="/" class="logo">FUZZI FILMS</a>
    <div class="nav-actions">
        <a href="/carrinho" class="btn btn-ghost">&#8592; Carrinho</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">🌙</button>
    </div>
</header>

<div class="checkout-page">

    <nav class="checkout-breadcrumb">
        <a href="/">Loja</a>
        <span class="sep">/</span>
        <a href="/carrinho">Carrinho</a>
        <span class="sep">/</span>
        <span>Finalizar compra</span>
    </nav>

    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}" style="margin-bottom:16px;"></div>

    <form method="post" th:action="@{/pagamento/processar}" id="checkout-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="checkout-layout">

            <!-- ══ Esquerda ══ -->
            <div>
                <!-- Itens do pedido -->
                <div class="checkout-card">
                    <p class="checkout-card-title">Itens do pedido</p>
                    <div th:each="item : ${itens}" class="item-row">
                        <img class="item-img"
                             th:if="${item.produto.imagem != null}"
                             th:src="@{/uploads/images/__${item.produto.imagem}__}"
                             th:alt="${item.produto.nome}">
                        <div class="item-ph" th:unless="${item.produto.imagem != null}">📦</div>
                        <div class="item-info">
                            <p class="item-name" th:text="${item.produto.nome}">Produto</p>
                            <p class="item-qty" th:text="'Qtd: ' + ${item.quantidade}">Qtd: 1</p>
                        </div>
                        <span class="item-price"
                              th:text="'R$ ' + ${#numbers.formatDecimal(item.produto.preco * item.quantidade, 1, 'COMMA', 2, 'POINT')}">
                            R$ 0,00
                        </span>
                    </div>
                </div>

                <!-- Método de pagamento -->
                <div class="checkout-card">
                    <p class="checkout-card-title">Forma de pagamento</p>
                    <div class="metodo-opcoes">

                        <label class="metodo-label" id="label-pix">
                            <input type="radio" name="metodo" value="PIX" required>
                            <div class="metodo-radio-dot"></div>
                            <div class="metodo-icon">⚡</div>
                            <div class="metodo-texto">
                                <p class="metodo-nome">PIX</p>
                                <p class="metodo-desc">Aprovação instantânea</p>
                            </div>
                            <span class="metodo-badge metodo-badge-pix">Instantâneo</span>
                        </label>

                        <label class="metodo-label" id="label-mp">
                            <input type="radio" name="metodo" value="MERCADO_PAGO" required>
                            <div class="metodo-radio-dot"></div>
                            <div class="metodo-icon">💳</div>
                            <div class="metodo-texto">
                                <p class="metodo-nome">Cartão de crédito</p>
                                <p class="metodo-desc">Via Mercado Pago</p>
                            </div>
                            <span class="metodo-badge metodo-badge-mp">Crédito</span>
                        </label>

                    </div>
                </div>
            </div>

            <!-- ══ Resumo (sidebar) ══ -->
            <div class="resumo-card">
                <p class="resumo-title">Resumo</p>

                <div class="resumo-row">
                    <span class="lbl">Subtotal</span>
                    <span class="val" th:text="'R$ ' + ${#numbers.formatDecimal(subtotal, 1, 'COMMA', 2, 'POINT')}">R$ 0,00</span>
                </div>
                <div class="resumo-row">
                    <span class="lbl">Frete</span>
                    <span class="val-ok" th:if="${frete == 0}">Grátis</span>
                    <span class="val" th:unless="${frete == 0}"
                          th:text="'R$ ' + ${#numbers.formatDecimal(frete, 1, 'COMMA', 2, 'POINT')}">R$ 0,00</span>
                </div>

                <div class="resumo-divider"></div>

                <div class="resumo-total">
                    <span class="lbl-total">Total</span>
                    <span th:text="'R$ ' + ${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}">R$ 0,00</span>
                </div>

                <button type="submit" class="btn btn-primary btn-pagar">
                    Confirmar pagamento
                </button>

                <p class="resumo-seguro">🔒 Pagamento 100% seguro</p>
            </div>

        </div>
    </form>
</div>

<script>
    document.querySelectorAll('.metodo-label').forEach(label => {
        label.addEventListener('click', function () {
            document.querySelectorAll('.metodo-label').forEach(l => l.classList.remove('selected'));
            this.classList.add('selected');
            this.querySelector('input[type="radio"]').checked = true;
        });
    });
</script>

<div th:replace="fragments/theme :: themeScript"></div>
</body>
</html>
