<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verificação — Koregh Store</title>
      <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .code-input {
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 14px;
            font-family: monospace;
            padding: 14px;
        }
        .email-hint {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 22px;
            line-height: 1.6;
        }
        .resend-form { margin-top: 10px; }
        .resend-btn {
            width: 100%;
            background: var(--surface-2);
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            cursor: pointer;
            transition: background var(--transition);
            font-family: var(--font-body);
        }
        .resend-btn:hover { background: var(--bg); color: var(--text); }
        .timer {
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            margin-top: 12px;
        }
        .shield-icon {
            font-size: 40px;
            text-align: center;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <a href="/" class="brand">Koregh Store</a>
        <div class="shield-icon">🔐</div>
        <h1>Verificação em 2 etapas</h1>
        <p class="email-hint">
            Enviamos um código de 6 dígitos para<br>
            <strong th:text="${email}">email@exemplo.com</strong><br>
            <span style="color:var(--warn);font-weight:500;">Válido por 15 minutos.</span>
        </p>

        <ul class="flash-list" th:if="${erro}">
            <li class="error" th:text="${erro}"></li>
        </ul>
        <ul class="flash-list" th:if="${info}">
            <li class="info" th:text="${info}"></li>
        </ul>

        <form method="POST" th:action="@{/login/2fa}" >
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="field">
                <label for="codigo">Código de verificação</label>
                <input id="codigo" class="code-input" type="text" name="codigo"
                       placeholder="000000" required minlength="6" maxlength="6"
                       pattern="\d{6}" inputmode="numeric" autocomplete="one-time-code"
                       autofocus>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;">
                Confirmar código
            </button>
        </form>

        <form class="resend-form" method="POST" th:action="@{/login/reenviar}"  >
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="resend-btn">↻ Reenviar código</button>
        </form>

        <p class="timer" id="timer-text">Expira em <span id="countdown">15:00</span></p>
        <p class="footer-link"><a href="/login">← Voltar ao login</a></p>
    </div>
</div>
<script>
    let total = 15 * 60;
    const el = document.getElementById('countdown');
    const interval = setInterval(() => {
        if (total <= 0) { clearInterval(interval); el.textContent = 'Expirado'; return; }
        total--;
        const m = Math.floor(total / 60).toString().padStart(2,'0');
        const s = (total % 60).toString().padStart(2,'0');
        el.textContent = m + ':' + s;
        if (total < 60) el.style.color = 'var(--danger)';
    }, 1000);

    // Auto-submit on 6 digits
    document.getElementById('codigo').addEventListener('input', function() {
        if (this.value.length === 6 && /^\d{6}$/.test(this.value)) {
            this.closest('form').submit();
        }
    });
</script>
<div th:replace="fragments/theme :: themeScript"></div>
</body>
</html>
