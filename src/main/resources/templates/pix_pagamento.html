<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pagamento PIX — Koregh Store</title>
      <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .pix-page {
            min-height: calc(100vh - 56px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            background: var(--bg);
        }

        .pix-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 40px 36px;
            width: 100%;
            max-width: 480px;
            animation: cardIn 0.35s ease both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .pix-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .pix-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: #e8f5e9;
            color: #196b3a;
            border: 1px solid #bbdfc8;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.03em;
            margin-bottom: 16px;
        }

        .pix-badge::before {
            content: '';
            width: 7px;
            height: 7px;
            background: #196b3a;
            border-radius: 50%;
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.7); }
        }

        .pix-header h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .pix-header p {
            font-size: 13.5px;
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.5;
        }

        .pix-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-light);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .pix-divider::before,
        .pix-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .qr-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
        }

        .qr-wrapper img {
            width: 200px;
            height: 200px;
            border-radius: var(--radius-sm);
            display: block;
        }

        .copy-field {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .copy-field textarea {
            flex: 1;
            padding: 10px 13px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface-2);
            color: var(--text-muted);
            resize: none;
            height: 72px;
            line-height: 1.4;
            outline: none;
        }

        .copy-field textarea:focus {
            border-color: var(--border-focus);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(184,48,38,0.09);
        }

        .copy-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0 14px;
            background: var(--secondary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 500;
            transition: background var(--transition), transform var(--transition);
            min-width: 64px;
        }

        .copy-btn:hover { background: var(--secondary-hover); }
        .copy-btn:active { transform: scale(0.96); }
        .copy-btn .copy-icon { font-size: 18px; }

        .pix-info {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            background: var(--info-bg);
            border: 1px solid #c3d9f7;
            border-radius: var(--radius-sm);
            padding: 13px 14px;
            margin: 20px 0 24px;
            font-size: 12.5px;
            color: var(--info);
            line-height: 1.5;
        }

        .pix-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (max-width: 540px) {
            .pix-card { padding: 28px 20px; }
            .qr-wrapper img { width: 170px; height: 170px; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <a href="/" class="logo">Koregh Store</a>
    <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">🌙</button>
    </div>
</header>

<div class="pix-page">
    <div class="pix-card">

        <div class="pix-header">
            <div class="pix-badge">Aguardando pagamento</div>
            <h1>Pague com PIX</h1>
            <p>Escaneie o QR Code ou copie o código<br>no seu aplicativo bancário.</p>
        </div>

        <div class="qr-wrapper">
            <img th:src="'data:image/png;base64,' + ${qrCode}" alt="QR Code PIX">
        </div>

        <div class="pix-divider">ou copie o código</div>

        <div class="copy-field">
            <textarea id="pixCode" th:text="${qrCode}" readonly></textarea>
            <button class="copy-btn" onclick="copiarPix()">
                <span class="copy-icon">📋</span>
                <span id="copyLabel">Copiar</span>
            </button>
        </div>

        <div class="pix-info">
            ℹ️&nbsp; O pagamento é confirmado automaticamente em até 1 minuto após o envio.
        </div>

        <div class="pix-actions">
            <a href="/pedidos" class="btn btn-primary">✓ Ver meus pedidos</a>
            <a href="/" class="btn btn-ghost">Continuar comprando</a>
        </div>

    </div>
</div>

<script>
    function copiarPix() {
        const code = document.getElementById('pixCode');
        code.select();
        document.execCommand('copy');
        const label = document.getElementById('copyLabel');
        label.textContent = 'Copiado!';
        setTimeout(() => label.textContent = 'Copiar', 2500);
    }
</script>

<div th:replace="fragments/theme :: themeScript"></div>
</body>
</html>
