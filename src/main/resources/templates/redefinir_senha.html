<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redefinir senha — FUZZI FILMS</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <a href="/" class="brand">FUZZI FILMS</a>
        <h1>Redefinir senha</h1>
        <p style="font-size:13px; color:var(--text-muted); text-align:center;">
            Digite sua nova senha.
        </p>

        <ul class="flash-list" th:if="${erro}"><li class="error" th:text="${erro}"></li></ul>

        <form method="POST" th:action="@{/esqueci-senha/redefinir}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="field">
                <label for="senha">Nova senha</label>
                <input id="senha" type="password" name="senha" required minlength="8" maxlength="254" autocomplete="new-password">
            </div>
            <div class="field">
                <label for="confirmar">Confirmar nova senha</label>
                <input id="confirmar" type="password" name="confirmar" required minlength="8" maxlength="254" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:11px;">Redefinir senha</button>
        </form>
        <p class="footer-link"><a href="/login">← Voltar ao login</a></p>
    </div>
</div>
<div th:replace="fragments/theme :: themeScript"></div>
</body>
</html>
