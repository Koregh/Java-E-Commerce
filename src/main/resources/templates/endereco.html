<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Endereço de entrega — FUZZI FILMS</title>
      <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .endereco-page { max-width:680px; margin:0 auto; padding:40px 24px; }
        .endereco-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:28px; box-shadow:var(--shadow-sm); }
        .inline-fields { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        @media (max-width:560px) { .inline-fields { grid-template-columns:1fr; } }
        .btn-group { display:flex; gap:12px; margin-top:8px; }
        .cpf-hint { font-size:12px; color:var(--text-muted); margin-top:4px; }
    </style>
</head>
<body>

<header class="navbar">
    <a href="/" class="logo">FUZZI FILMS</a>
    <div class="nav-actions">
        <a href="/minha-conta" class="btn btn-ghost">← Minha conta</a>
     <form method="post" th:action="@{/logout}" sec:authorize="isAuthenticated()" style="display:inline;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" class="btn btn-danger">Sair</button>
</form>
    </div>
</header>

<div class="endereco-page">
    <div class="endereco-card">
        <h1 th:text="${endereco != null} ? '✏️ Editar endereço' : '🏠 Cadastrar endereço'">Endereço</h1>

        <!-- Mensagens flash -->
        <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
        <div th:if="${erro}"    class="alert alert-danger"  th:text="${erro}"></div>
        <div th:if="${info}"    class="alert alert-info"    th:text="${info}"></div>

        <form method="POST" th:action="@{/minha-conta/endereco/salvar}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="field">
    <label for="telefone">Telefone (WhatsApp) *</label>
    <input type="tel" id="telefone" name="telefone" class="form-control"
           th:value="${endereco?.telefone}" required maxlength="20"
           placeholder="(44) 99923-9590">
</div>

            <div class="field">
                <label for="logradouro">Endereço (Rua, Av., etc.) *</label>
                <input type="text" id="logradouro" name="logradouro" class="form-control"
                       th:value="${endereco?.endereco}" required minlength="3" maxlength="200"
                       placeholder="Ex: Rua das Flores">
            </div>

            <div class="inline-fields">
                <div class="field">
                    <label for="cep">CEP *</label>
                    <input type="text" id="cep" name="cep" class="form-control"
                           th:value="${endereco?.cep}" required placeholder="00000-000"
                           oninput="this.value=this.value.replace(/[^\d]/g,'').replace(/(\d{5})(\d)/,'$1-$2')">
                </div>
                <div class="field">
                    <label for="numero">Número *</label>
                    <input type="text" id="numero" name="numero" class="form-control"
                           th:value="${endereco?.numero}" required placeholder="123 / S/N">
                </div>
            </div>

            <div class="field">
                <label for="complemento">Complemento</label>
                <input type="text" id="complemento" name="complemento" class="form-control"
                       th:value="${endereco?.complemento}" placeholder="Apto, Bloco (opcional)">
            </div>

            <div class="field">
                <label for="cpf">CPF *</label>
                <div th:if="${endereco != null}">
                    <span class="form-control-plaintext" th:text="${endereco.cpfMascarado}"></span>
                    <small class="cpf-hint">Redigite o CPF completo para confirmar</small>
                </div>
                <input type="text" id="cpf" name="cpf" class="form-control" required maxlength="14"
                       placeholder="000.000.000-00"
                       oninput="this.value=this.value.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2')">
                <small class="cpf-hint">Único por conta. Será armazenado com hash e exibido mascarado.</small>
            </div>

            <div class="field">
                <label for="horarioEntrega">Horário de entrega preferido *</label>
                <select id="horarioEntrega" name="horarioEntrega" class="form-control" required>
                    <option value="">Selecione...</option>
                    <option value="08:00–12:00" th:selected="${endereco?.horarioEntrega == '08:00–12:00'}">Manhã (08:00 – 12:00)</option>
                    <option value="12:00–18:00" th:selected="${endereco?.horarioEntrega == '12:00–18:00'}">Tarde (12:00 – 18:00)</option>
                    <option value="18:00–22:00" th:selected="${endereco?.horarioEntrega == '18:00–22:00'}">Noite (18:00 – 22:00)</option>
                    <option value="Qualquer horário" th:selected="${endereco?.horarioEntrega == 'Qualquer horário'}">Qualquer horário</option>
                </select>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary">
                    <span th:text="${endereco != null} ? '🔒 Salvar e verificar' : '💾 Cadastrar e verificar'">Salvar</span>
                </button>
                <a href="/minha-conta" class="btn btn-secondary">Cancelar</a>
                
            </div>
            <div class="alert alert-warning">
    ⚠️ Você é responsável pela veracidade dos dados informados. Endereços incorretos podem causar atrasos ou perda da entrega.
</div>
        </form>
    </div>
</div>
<div th:replace="fragments/theme :: themeScript"></div>
</body>

<script>
    document.getElementById('cep').addEventListener('blur', function() {
        const cep = this.value.replace(/\D/g, '');
        if (cep.length === 8) {
            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(response => response.json())
                .then(data => {
                    if (!data.erro) {
                        document.getElementById('logradouro').value = data.logradouro;
                        // Se quiser preencher cidade e estado (se você tiver campos separados)
                        // document.getElementById('cidade').value = data.localidade;
                        // document.getElementById('estado').value = data.uf;
                    } else {
                        alert('CEP não encontrado');
                    }
                })
                .catch(() => alert('Erro ao buscar CEP'));
        }
    });
</script>

</html>
