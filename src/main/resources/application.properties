spring.application.name=ecommerce

# BANCO - use variáveis de ambiente em produção
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:1234}

# MERCADO PAGO

mercadopago.access_token=SEU_ACCESS_TOKEN_AQUI
mercadopago.public_key=SUA_PUBLIC_KEY_AQUI
mercadopago.webhook_secret=UM_SEGREDO_OPCIONAL_PARA_VALIDAR_WEBHOOKSZ'

server.tomcat.max-http-form-post-size=5MB
server.tomcat.connection-timeout=20000ms
server.tomcat.keep-alive-timeout=20000ms

server.tomcat.max-connections=10000        
server.tomcat.threads.max=200              
server.tomcat.threads.min-spare=10        
server.tomcat.accept-count=100             

# só em HTTPS

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true      
server.servlet.session.cookie.same-site=strict

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Sessão
server.servlet.session.timeout=30m

# E-mail — configure via variáveis de ambiente em produção
# Dev: sem SMTP configurado, e-mails vão para o console
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Thymeleaf security dialect
spring.thymeleaf.enabled=true
