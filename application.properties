spring.application.name=ecommerce

# BANCO - use variáveis de ambiente em produção
spring.datasource.url=${postgresql://postgres:zUpZnqHIUZPoQUSplsDZQBjXJHjIdyWI@junction.proxy.rlwy.net:14736/railway}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Sessão
server.servlet.session.timeout=30m
server.port=${PORT:8080}

# E-mail — configure via variáveis de ambiente em produção
# Dev: sem SMTP configurado, e-mails vão para o console
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Thymeleaf security dialect
spring.thymeleaf.enabled=true
